{% extends "base.html" %}
{% block title %}Login — Hotel MVP{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-brand">Hotel San Marcos</div>
  <div class="page-header">
    <h1>Ingresar</h1>
    <p class="subtitle">Ingresa tu usuario y contraseña para continuar.</p>
  </div>
  <form class="card" method="post">
    {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}
    <label for="username">Usuario</label>
    <input type="text" name="username" id="username" required autofocus autocomplete="username">

    <label for="password">Contraseña</label>
    <input type="password" name="password" id="password" required autocomplete="current-password">

    <button type="submit">Ingresar</button>
  </form>
</div>
{% endblock %}
